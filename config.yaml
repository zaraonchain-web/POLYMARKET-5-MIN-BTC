# ============================================================
# Polymarket Latency Arbitrage Bot — Configuration
# ============================================================

# --- Binance WebSocket ---
binance:
  ws_url: "wss://stream.binance.com:9443/ws/btcusdt@ticker"

# --- Polymarket ---
polymarket:
  clob_ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/"
  clob_rest_url: "https://clob.polymarket.com"
  # Chain ID: 137 = Polygon mainnet
  chain_id: 137

# --- Signal Detection ---
signal:
  # Rolling window (seconds) to compute BTC price change
  price_window_seconds: 30
  # Minimum % price move to trigger a signal.
  # 0.10% fires on noise constantly and will bleed fees. Keep at 0.40%.
  # Only lower once you have calibration data proving edge at smaller moves.
  price_change_threshold_pct: 0.01
  # Only enter if Polymarket UP token is in this range.
  # Widening to 0.25/0.75 lets you enter when the market has ALREADY moved
  # significantly — exactly when the latency edge is gone. Keep at 0.35/0.65.
  polymarket_min_price: 0.35
  polymarket_max_price: 0.65
  # Minimum edge (fair_prob - market_price) required to enter.
  # 0.03 is below the round-trip cost (spread + 2x fees ≈ 0.02-0.04).
  # At 0.03 edge you are paying to trade. Keep at 0.10.
  min_edge: 0.10

# --- Position Management ---
position:
  # Max USDC per trade
  max_trade_size_usdc: 20.0
  # Hold duration before forced exit (seconds)
  hold_seconds: 240       # 4 minutes
  # Take profit threshold (fractional, e.g. 0.15 = 15%)
  take_profit_pct: 0.15
  # Maximum concurrent open positions
  max_concurrent: 1

# --- Risk Guards ---
risk:
  # Stop trading if cumulative day loss exceeds this (USDC)
  daily_loss_limit_usdc: 100.0
  # Don't enter in last N seconds of a 5-min window.
  # 30s is borderline — a 4-second fill + 26s to reprice is very tight.
  # 60s is safer; only lower once you have fill-time data from live runs.
  settlement_buffer_seconds: 60
  # Skip signal if order book spread > this
  max_spread: 0.05
  # 5-minute market window duration (seconds)
  market_window_seconds: 300

# --- Execution (live mode) ---
execution:
  # Seconds between position status polls after order placement
  poll_interval_seconds: 10
  # Max seconds to wait for fill before abandoning
  fill_timeout_seconds: 30

# --- Logging ---
logging:
  results_csv: "results.csv"
  error_log: "error.log"
  # Print P&L summary to terminal every N seconds
  summary_interval_seconds: 60
